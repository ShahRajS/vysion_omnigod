name: Vysion CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  flutter-validation:
    name: Flutter Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x' # Match nearest stable
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Code
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Check Formatting
        run: dart format --set-exit-if-changed .

      - name: Static Analysis
        run: flutter analyze

      - name: Run Widget & Unit Tests
        run: flutter test

  backend-validation:
    name: Node.js Backend Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install Dependencies
        run: |
          cd backend
          npm install

      - name: Typecheck & Lint
        run: |
          cd backend
          npm run lint

      - name: Run Backend Tests
        run: |
          cd backend
          npm test
