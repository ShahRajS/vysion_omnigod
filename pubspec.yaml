name: vysion_omnigod
description: "Vysion v2 - Rebuilt Accessibility Co-pilot"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  camera: ^0.11.0
  cloud_firestore: ^4.17.4
  cupertino_icons: ^1.0.8
  drift: ^2.19.0
  firebase_auth: ^4.19.6
  firebase_core: ^2.32.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_tts: ^4.1.0
  geolocator: ^12.0.0
  go_router: ^14.2.0
  google_generative_ai: ^0.4.1
  google_maps_flutter: ^2.6.1
  google_mlkit_text_recognition: ^0.13.0
  flutter_tesseract_ocr: ^0.4.30
  http: ^1.2.1
  intl: ^0.20.2
  mutex: ^3.1.0
  path: any
  path_provider: any
  shared_preferences: ^2.2.3
  sqlite3_flutter_libs: ^0.5.22
  web_socket_channel: ^3.0.1
  workmanager: ^0.5.2

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.19.0
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/sounds/
    - assets/tessdata_config.json
    - assets/tessdata/
